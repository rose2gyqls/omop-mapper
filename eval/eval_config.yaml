# MapOMOP 인간 평가 정량평가 설정
# - eval_file: 인간 평가 엑셀 (첫 시트=unique concept 결과, 나머지=평가자별 시트)
# - json_file: 20회 매핑 결과 JSON (한 파일)
# - json_files: 도메인별 JSON 여러 개 — 리스트 순서가 엑셀의 index(행 순서) 블록과 같아야 함
# - name: 데이터셋 식별자 (출력용)

# data_source: "데이터" 컬럼 값 (SNUH | SNOMED)
