services:
  - type: web
    name: mapomop
    runtime: python
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_MODEL
        value: gpt-5-mini-2025-08-07
      - key: ES_SERVER_PORT
        value: "9200"
      - key: ES_USE_SSL
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: ES_SERVER_HOST
        sync: false
      - key: ES_SERVER_USERNAME
        sync: false
      - key: ES_SERVER_PASSWORD
        sync: false
